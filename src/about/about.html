<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="about.title">Sobre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 32px 16px;
        }

        .app-name {
            font-size: 22px;
            font-weight: 600;
            margin-top: 4px;
            color: #cdd6f4;
        }

        .app-version {
            font-size: 13px;
            color: #a6adc8;
            margin-top: 4px;
        }

        .packaged-by {
            font-size: 12px;
            color: #6c7086;
            margin-top: 12px;
            text-align: center;
        }

        .info-table {
            width: 100%;
            margin-top: 20px;
            border-top: 1px solid #313244;
            padding-top: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
        }

        .info-key {
            color: #6c7086;
        }

        .info-value {
            color: #cdd6f4;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
        }

        .meta-table {
            width: 100%;
            margin-top: 12px;
            border-top: 1px solid #313244;
            padding-top: 12px;
        }

        .actions {
            margin-top: auto;
            padding-top: 20px;
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #89b4fa;
            color: #1e1e2e;
        }

        .btn-secondary {
            background: #45475a;
            color: #cdd6f4;
        }

        .copied {
            font-size: 12px;
            color: #a6e3a1;
            text-align: center;
            margin-top: 8px;
            min-height: 16px;
        }
    </style>
</head>
<body>
    <div class="app-name" id="app-name">-</div>
    <div class="app-version" id="app-version">-</div>
    <div class="packaged-by" id="packaged-by">-</div>

    <div class="info-table">
        <div class="info-row">
            <span class="info-key">Electron</span>
            <span class="info-value" id="info-electron">-</span>
        </div>
        <div class="info-row">
            <span class="info-key">Chromium</span>
            <span class="info-value" id="info-chromium">-</span>
        </div>
        <div class="info-row">
            <span class="info-key">Node.js</span>
            <span class="info-value" id="info-node">-</span>
        </div>
        <div class="info-row">
            <span class="info-key">V8</span>
            <span class="info-value" id="info-v8">-</span>
        </div>
    </div>

    <div class="meta-table">
        <div class="info-row">
            <span class="info-key" data-i18n="about.platform">Plataforma</span>
            <span class="info-value" id="info-platform">-</span>
        </div>
        <div class="info-row">
            <span class="info-key" data-i18n="about.author">Autor</span>
            <span class="info-value" id="info-author">-</span>
        </div>
        <div class="info-row">
            <span class="info-key" data-i18n="about.license">Licenca</span>
            <span class="info-value" id="info-license">-</span>
        </div>
    </div>

    <div class="copied" id="copied"></div>

    <div class="actions">
        <button class="btn btn-secondary" id="btn-copy" data-i18n="about.copyInfo">Copiar info</button>
        <button class="btn btn-primary" id="btn-close" data-i18n="about.close">Fechar</button>
    </div>

    <script>
        let info = null;
        let strings = {};

        function resolveKey(obj, key) {
            const parts = key.split('.');
            let value = obj;
            for (const p of parts) {
                if (value === null || value === undefined) return undefined;
                value = value[p];
            }
            return value;
        }

        function t(key, params) {
            let value = resolveKey(strings, key);
            if (value === undefined) return key;
            if (params) {
                value = value.replace(/\{(\w+)\}/g, (_, k) => params[k] !== undefined ? String(params[k]) : '{' + k + '}');
            }
            return value;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const value = resolveKey(strings, el.dataset.i18n);
                if (value !== undefined) {
                    if (el.tagName === 'TITLE') {
                        document.title = value;
                    } else {
                        el.textContent = value;
                    }
                }
            });
            renderDynamic();
        }

        function renderDynamic() {
            if (!info) return;
            document.getElementById('app-name').textContent = info.appName;
            document.getElementById('app-version').textContent = t('about.version', { version: info.appVersion });
            document.getElementById('packaged-by').textContent = t('about.packagedBy', {
                nestApp: info.nestAppName,
                version: info.nestAppVersion
            });
            document.getElementById('info-electron').textContent = info.electron;
            document.getElementById('info-chromium').textContent = info.chromium;
            document.getElementById('info-node').textContent = info.node;
            document.getElementById('info-v8').textContent = info.v8;
            document.getElementById('info-platform').textContent = info.platform + ' ' + info.arch;
            document.getElementById('info-author').textContent = info.author || '-';
            document.getElementById('info-license').textContent = info.license || '-';
        }

        document.getElementById('btn-copy').addEventListener('click', async () => {
            if (!info) return;
            const text = [
                info.appName + ' ' + info.appVersion,
                t('about.packagedBy', { nestApp: info.nestAppName, version: info.nestAppVersion }),
                'Electron: ' + info.electron,
                'Chromium: ' + info.chromium,
                'Node.js:  ' + info.node,
                'V8:       ' + info.v8,
                t('about.platform') + ': ' + info.platform + ' ' + info.arch,
                t('about.author') + ': ' + (info.author || '-'),
                t('about.license') + ': ' + (info.license || '-')
            ].join('\n');
            try {
                await navigator.clipboard.writeText(text);
                const copied = document.getElementById('copied');
                copied.textContent = t('about.copied');
                setTimeout(() => { copied.textContent = ''; }, 2000);
            } catch (e) {}
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            window.aboutAPI.close();
        });

        window.i18nAPI.onChanged((payload) => {
            strings = payload.strings || {};
            applyTranslations();
        });

        (async () => {
            const i18nData = await window.i18nAPI.get();
            strings = i18nData.strings || {};
            info = await window.aboutAPI.getInfo();
            applyTranslations();
        })();
    </script>
</body>
</html>
