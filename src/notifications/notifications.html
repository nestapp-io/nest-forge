<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="notifications.title">Notificacoes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-shrink: 0;
        }

        .toolbar-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            background: #313244;
            color: #cdd6f4;
            transition: background 0.15s;
        }

        .toolbar-btn:hover {
            background: #45475a;
        }

        .toolbar-btn.danger {
            color: #f38ba8;
        }

        .toolbar-btn.danger:hover {
            background: #f38ba8;
            color: #1e1e2e;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .toolbar-count {
            font-size: 12px;
            color: #6c7086;
        }

        .notification-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .notification-list::-webkit-scrollbar {
            width: 6px;
        }

        .notification-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .notification-list::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 3px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c7086;
            font-size: 14px;
        }

        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .notif-item:hover {
            background: #313244;
        }

        .notif-item.unread {
            border-left: 3px solid #89b4fa;
        }

        .notif-item.selected {
            background: #313244;
            border-color: #89b4fa;
        }

        .notif-item.pinned {
            background: #1e1e2e;
            border-left: 3px solid #f9e2af;
        }

        .notif-checkbox {
            margin-top: 3px;
            flex-shrink: 0;
            accent-color: #89b4fa;
        }

        .notif-content {
            flex: 1;
            min-width: 0;
        }

        .notif-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .notif-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .notif-time {
            font-size: 11px;
            color: #6c7086;
            flex-shrink: 0;
        }

        .notif-body {
            font-size: 12px;
            color: #a6adc8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notif-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .notif-item:hover .notif-actions {
            opacity: 1;
        }

        .notif-action {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            background: #45475a;
            color: #cdd6f4;
            transition: background 0.15s;
        }

        .notif-action:hover {
            background: #585b70;
        }

        .notif-action.pin-active {
            background: #f9e2af;
            color: #1e1e2e;
        }

        .notif-action.delete:hover {
            background: #f38ba8;
            color: #1e1e2e;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="toolbar-btn" id="btn-select-all" data-i18n="notifications.selectAll">Selecionar tudo</button>
        <button class="toolbar-btn" id="btn-deselect-all" data-i18n="notifications.deselectAll">Desmarcar</button>
        <button class="toolbar-btn danger" id="btn-delete-selected" data-i18n="notifications.deleteSelected">Apagar selecionadas</button>
        <div class="toolbar-spacer"></div>
        <button class="toolbar-btn" id="btn-clear-read" data-i18n="notifications.clearRead">Limpar lidas</button>
        <button class="toolbar-btn danger" id="btn-clear-all" data-i18n="notifications.clearAll">Limpar todas</button>
        <span class="toolbar-count" id="count-label"></span>
    </div>

    <div class="notification-list" id="notification-list">
        <div class="empty-state" id="empty-state" data-i18n="notifications.empty">Nenhuma notificacao</div>
    </div>

    <script>
        const listEl = document.getElementById('notification-list');
        const emptyState = document.getElementById('empty-state');
        const countLabel = document.getElementById('count-label');
        let notifications = [];
        let strings = {};

        function resolveKey(obj, key) {
            const parts = key.split('.');
            let value = obj;
            for (const p of parts) {
                if (value === null || value === undefined) return undefined;
                value = value[p];
            }
            return value;
        }

        function t(key, params) {
            let value = resolveKey(strings, key);
            if (value === undefined) return key;
            if (params) {
                value = value.replace(/\{(\w+)\}/g, (_, k) => params[k] !== undefined ? String(params[k]) : '{' + k + '}');
            }
            return value;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const value = resolveKey(strings, el.dataset.i18n);
                if (value !== undefined) {
                    if (el.tagName === 'TITLE') {
                        document.title = value;
                    } else {
                        el.textContent = value;
                    }
                }
            });
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const time = hours + ':' + minutes;

            if (d.toDateString() === now.toDateString()) return time;

            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return day + '/' + month + ' ' + time;
        }

        function render(list) {
            notifications = list;
            const unread = list.filter(n => !n.read).length;
            const selected = list.filter(n => n.selected).length;
            countLabel.textContent = unread > 0
                ? t('notifications.unreadCount', { count: unread })
                : t('notifications.totalCount', { count: list.length });

            document.getElementById('btn-delete-selected').style.display = selected > 0 ? 'inline-block' : 'none';

            if (list.length === 0) {
                emptyState.style.display = 'flex';
                listEl.querySelectorAll('.notif-item').forEach(el => el.remove());
                return;
            }

            emptyState.style.display = 'none';

            const fragment = document.createDocumentFragment();

            list.forEach(notif => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                if (!notif.read) item.classList.add('unread');
                if (notif.selected) item.classList.add('selected');
                if (notif.pinned) item.classList.add('pinned');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'notif-checkbox';
                checkbox.checked = !!notif.selected;
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.notificationsAPI.toggleSelect(notif.id);
                });

                const content = document.createElement('div');
                content.className = 'notif-content';

                const header = document.createElement('div');
                header.className = 'notif-header';

                const title = document.createElement('span');
                title.className = 'notif-title';
                title.textContent = notif.title;

                const time = document.createElement('span');
                time.className = 'notif-time';
                time.textContent = formatTime(notif.timestamp);

                header.appendChild(title);
                header.appendChild(time);

                const body = document.createElement('div');
                body.className = 'notif-body';
                body.textContent = notif.body || '';

                content.appendChild(header);
                content.appendChild(body);

                const actions = document.createElement('div');
                actions.className = 'notif-actions';

                const pinBtn = document.createElement('button');
                pinBtn.className = 'notif-action' + (notif.pinned ? ' pin-active' : '');
                pinBtn.textContent = notif.pinned ? t('notifications.pinned') : t('notifications.pin');
                pinBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.notificationsAPI.togglePin(notif.id);
                });

                const delBtn = document.createElement('button');
                delBtn.className = 'notif-action delete';
                delBtn.textContent = t('notifications.delete');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.notificationsAPI.remove(notif.id);
                });

                actions.appendChild(pinBtn);
                actions.appendChild(delBtn);

                item.appendChild(checkbox);
                item.appendChild(content);
                item.appendChild(actions);

                item.addEventListener('click', () => {
                    window.notificationsAPI.open(notif.id);
                });

                fragment.appendChild(item);
            });

            const oldItems = listEl.querySelectorAll('.notif-item');
            oldItems.forEach(el => el.remove());
            listEl.appendChild(fragment);
        }

        document.getElementById('btn-select-all').addEventListener('click', () => {
            window.notificationsAPI.selectAll();
        });

        document.getElementById('btn-deselect-all').addEventListener('click', () => {
            window.notificationsAPI.deselectAll();
        });

        document.getElementById('btn-delete-selected').addEventListener('click', () => {
            window.notificationsAPI.deleteSelected();
        });

        document.getElementById('btn-clear-read').addEventListener('click', () => {
            window.notificationsAPI.clearRead();
        });

        document.getElementById('btn-clear-all').addEventListener('click', () => {
            window.notificationsAPI.clearAll();
        });

        window.notificationsAPI.onUpdated((list) => {
            render(list);
        });

        window.i18nAPI.onChanged((payload) => {
            strings = payload.strings || {};
            applyTranslations();
            render(notifications);
        });

        (async () => {
            const i18nData = await window.i18nAPI.get();
            strings = i18nData.strings || {};
            applyTranslations();
            const list = await window.notificationsAPI.getAll();
            render(list);
        })();
    </script>
</body>
</html>
