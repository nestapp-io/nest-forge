name: Publish Electron Template (OCI)

on:
  push:
    tags:
      - 'template/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Template version (default: lê de templates/api-overlay/template.json)'
        required: false
        default: ''
      dry-run:
        description: 'Não publica no GHCR, só gera local'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

jobs:
  publish-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install zstd (ubuntu-latest usually has it)
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd tar

      - name: Install regctl (regclient CLI)
        run: |
          REGCLIENT_VERSION="v0.7.1"
          curl -sSL "https://github.com/regclient/regclient/releases/download/${REGCLIENT_VERSION}/regctl-linux-amd64" \
            -o /tmp/regctl
          sudo install -m 0755 /tmp/regctl /usr/local/bin/regctl
          regctl version

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./templates/api-overlay/template.json').version")
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish template (linux-x64)
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          node scripts/publish-template.js \
            --version=${{ steps.version.outputs.version }} \
            --platform=linux \
            --arch=x64 \
            --registry=ghcr.io/${{ github.repository_owner }} \
            $DRY_RUN_FLAG

      - name: Upload manifest artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: template-manifest-${{ steps.version.outputs.version }}
          path: dist/template-manifest-*.json
          retention-days: 30
